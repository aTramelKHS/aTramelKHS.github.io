<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>They Must Die</title>
        <link rel="stylesheet" href="style.css">
        
        <script src="https://cdn.jsdelivr.net/npm/sat@0.9.0/SAT.min.js"></script>
        <script src="jquery.min.js"></script>
        
    </head>
    <body>
        <div class="MAIN-MENU" hidden>
            <h1 id="title">They Must Die</h1>
            <h2>By: Austin :)</h2>
            <button onclick="runProgram()">Play game</button>
            <h3>CONTROLS:</h3>
            <p>W,A,S,D = movement, R = reload, Space = dodge roll, 1 = primary, 2 = secondary, 3 = melee, E = equip</p>
        </div> 
        <div class='GAME' hidden>
            <canvas id='game' width="1400px" height="700px"></canvas>
            <div class="ui">
                <div id="health-container"><div id="health-fill"><span id="health-number"></span></div></div>
                <p id="stamina-bar">STAM: <span id="stamina"></span></p>
                <p id="ammo-count">AMMO: <span id="ammo"></span></p>
                <p id="wave-count">WAVE: <span id="wave"></span></p>
                <div hidden id="death-screen"></div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
